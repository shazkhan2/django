{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/dist.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Transport Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-50 text-gray-900">
    <nav class="bg-[#141414] text-white py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-1.5 rounded">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="font-bold text-lg tracking-tight">TransportHub</span>
            </div>
            
            <div class="hidden md:flex items-center gap-6">
                <a href="{% url 'tours:index' %}" class="text-sm font-medium hover:text-blue-400 transition-colors">Dashboard</a>
                <a href="#" class="text-sm font-medium hover:text-blue-400 transition-colors">History</a>
                <a href="#" class="text-sm font-medium hover:text-blue-400 transition-colors">Profile</a>
                <a href="{% url 'logout_user' %}" class="px-3 py-1.5 bg-white/10 hover:bg-white/20 rounded-md text-xs font-bold transition-all">SIGN OUT</a>
            </div>
        </div>
    </nav>

    {% if messages %}
    <div class="max-w-7xl mx-auto w-full px-6 mt-4">
        {% for message in messages %} 
        <div class="p-4 rounded-md mb-4 {% if message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200{% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 py-8 px-6 mt-auto">
        <div class="max-w-7xl mx-auto flex justify-between items-center text-xs text-gray-400 uppercase tracking-widest font-mono">
            <span>&copy; 2026 TRANSPORT OPERATIONS</span>
            <div class="flex gap-6">
                <a href="#" class="hover:text-black">Privacy</a>
                <a href="#" class="hover:text-black">Terms</a>
                <a href="#" class="hover:text-black">Support</a>
            </div>
        </div>
    </footer>
</body>
</html>
