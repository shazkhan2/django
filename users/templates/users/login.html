{% extends "base.html" %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="flex justify-center mb-8">
            <div class="bg-[#141414] p-3 rounded-xl shadow-lg ring-1 ring-white/20">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
        </div>
        
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">Sign in to TransportHub</h1>
            <p class="text-sm text-gray-500 mt-2 uppercase tracking-widest font-mono font-medium">Operations Center</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Username</label>
                <input type="text" name="username" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm" placeholder="operator_id" required>
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Security Key</label>
                <input type="password" name="password" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm" placeholder="••••••••" required>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-[#141414] text-white py-3 rounded-lg font-bold text-sm uppercase tracking-widest hover:bg-gray-800 transition-all shadow-lg active:scale-[0.98]">
                    Establish Connection
                </button>
            </div>
        </form>

        <div class="mt-10 pt-6 border-t border-gray-50 text-center">
            <p class="text-xs text-gray-400">New operator? <a href="{% url 'register_user' %}" class="text-blue-600 font-bold hover:underline">Enroll Here</a></p>
        </div>
    </div>
</div>
{% endblock %}
