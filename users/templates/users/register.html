{% extends 'base.html' %}

{% block content %}

<div class="flex justify-center items-center ">
<div class="w-full max-w-md rounded-lg p-8 bg-white shadow-md">

  <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
  <form method="post" action="{% url 'register_user' %}" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      {{ field }}
      {% for error in field.errors %}
        <p class="text-red-500 text-sm">{{ error }}</p>
      {% endfor %}
    </div>
  {% endfor %}
    <button class="block mx-auto py-2 px-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded cursor-pointer transition-colors mb-4" type="submit">
  Register
</button>
  </form>
</div>
</div>
{% endblock %}
